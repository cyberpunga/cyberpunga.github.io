<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Mono&display=swap");
      @import url("https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap");
      body {
        padding: 8px;
        margin: 0px;
        background: #f0f0f0;
        overflow: hidden;
      }

      button {
        display: block;
        margin-top: 16px;
        font-family: "Press Start 2P", cursive;
        padding: 8px;
        font-size: 24px;
      }

      .contenedor {
        position: absolute;
        width: 100%;
        height: 100vh;
        display: flex;
      }

      .parrafo {
        margin: auto auto;
        font-family: "Press Start 2P", cursive;
        font-size: 24px;
        max-width: 480px;
        padding: 16px;
        color: #111111;
        background: #ffffff;
        /* animation: fadein 0.8s; */
        cursor: pointer;
        box-shadow: 8px 8px 1px #11111188;
      }

      .error {
        font-family: "Press Start 2P", cursive;
        color: blue;
      }

      @keyframes fadein {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
    <script>
      let contador = 0;
      const milisegundos = 2400;

      let x;
      let y;

      const bucle = setInterval(hacerCosas, milisegundos);

      function hacerCosas() {
        const contenedor = document.createElement("div");
        contenedor.classList.add("contenedor");
        const parrafo = document.createElement("p");
        const boton = document.createElement("button");
        boton.innerHTML = "No importa";
        boton.addEventListener("click", function () {
          console.log("lala");
          document.body.removeChild(contenedor);
        });
        parrafo.classList.add("parrafo");
        parrafo.style.transform = `rotateX(${y * 0.04}deg) rotateY(${x * -0.04}deg)`;
        contenedor.appendChild(parrafo);
        // if (contador % 2) {
        const error = document.createElement("span");
        error.innerText = errores[Math.floor(Math.random() * errores.length)];
        error.classList.add("error");
        parrafo.innerHTML = "Hay viejos culiaos que no creen que en un poema se pueda decir: ";
        parrafo.appendChild(error);
        parrafo.appendChild(boton);
        // } else {
        //   parrafo.innerText = "No importa";
        // }
        document.body.appendChild(contenedor);
        contenedor.style.left = `${contador * 16}px`;
        contenedor.style.top = `${contador * 16}px`;
        if (contador > 8) {
          document.body.removeChild(document.body.firstElementChild);
          contador = 0;
        }
        contador++;
      }

      document.addEventListener("mousemove", function (e) {
        x = e.clientX - window.innerWidth / 2;
        y = e.clientY - window.innerHeight / 2;
        const parrafos = document.querySelectorAll("p");
        for (let i = 0; i < parrafos.length; i++) {
          parrafos[i].style.transform = `rotateX(${y * 0.04}deg) rotateY(${x * -0.04}deg)`;
        }
      });

      const errores = [
        "400 Bad Request",
        "401 Unauthorized4​",
        "402 Payment Required",
        "403 Forbidden",
        "404 Not Found",
        "405 Method Not Allowed",
        "406 Not Acceptable",
        "407 Proxy Authentication Required",
        "408 Request Timeout",
        "409 Conflict",
        "410 Gone",
        "411 Length Required",
        "412 Precondition Failed",
        "413 Request Entity Too Large",
        "414 Request-URI Too Long",
        "415 Unsupported Media Type",
        "416 Requested Range Not Satisfiable",
        "417 Expectation Failed",
        "418 I'm a teapot",
        "422 Unprocessable Entity (WebDAV - RFC 4918)",
        "423 Locked (WebDAV - RFC 4918)",
        "424 Failed Dependency (WebDAV) (RFC 4918)",
        "425 Unassigned",
        "426 Upgrade Required (RFC 7231)",
        "428 Precondition Required",
        "429 Too Many Requests",
        "431 Request Header Fields Too Large)",
        "449",
        "451 Unavailable for Legal Reasons",
        "500 Internal Server Error",
        "501 Not Implemented",
        "502 Bad Gateway",
        "503 Service Unavailable",
        "504 Gateway Timeout",
        "505 HTTP Version Not Supported",
        "506 Variant Also Negotiates (RFC 2295)",
        "507 Insufficient Storage (WebDAV - RFC 4918)",
        "508 Loop Detected (WebDAV)",
        "509 Bandwidth Limit Exceeded",
        "510 Not Extended (RFC 2774)",
        "511 Network Authentication Required",
        "512 Not updated",
        "521 Version Mismatch",
      ];
    </script>
  </head>
  <body>
    <div class="contenedor">
      <p class="parrafo">
        Hay viejos culiaos que no creen que en un poema se pueda decir:
        <span class="error">500 Internal Server Error</span><button>No importa</button>
      </p>
    </div>
  </body>
</html>
